<section id="contact" class="contact-section">
    <div class="contact-container">
        
        <div class="contact-header">
            <h2 class="section-title">{{ lang.t('contact.title') }}</h2>
            <h3 class="section-subtitle">{{ lang.t('contact.subtitle') }}</h3>
        </div>

        <div class="contact-grid">
            
            <div class="contact-info">
                <h3 class="info-title">{{ lang.t('contact.infoTitle') }}</h3>
                <p class="info-desc">{{ lang.t('contact.infoDesc') }}</p>
                
                <div class="info-item">
                    <span class="info-icon">📧</span>
                    <a href="osvaldoeverdiaz@gmail.com" class="info-link">osvaldoeverdiaz@gmail.com</a>
                </div>

                <div class="info-item">
                    <span class="info-icon">📱</span>
                    <span class="info-text">+54 9 379 4573947</span>
                </div>
                
                <div class="info-item">
                    <span class="info-icon">📍</span>
                    <span class="info-text">Corrientes, Argentina</span>
                </div>
            </div>

            <div class="contact-form-wrapper">
                <form action="https://formspree.io/f/xkoakpbd" method="POST" class="contact-form">
                    
                    <div class="input-group">
                        <input type="text" name="name" id="name" required placeholder=" ">
                        <label for="name">{{ lang.t('contact.nameLabel') }}</label>
                    </div>

                    <div class="input-group">
                        <input type="email" name="email" id="email" required placeholder=" ">
                        <label for="email">{{ lang.t('contact.emailLabel') }}</label>
                    </div>

                    <div class="input-group">
                        <textarea name="message" id="message" rows="5" required placeholder=" "></textarea>
                        <label for="message">{{ lang.t('contact.msgLabel') }}</label>
                    </div>

                    <button type="submit" class="btn btn-primary submit-btn">
                        {{ lang.t('contact.btnSend') }} <span class="icon">🤘</span>
                    </button>
                    
                </form>
            </div>
            
        </div>
    </div>
</section>
